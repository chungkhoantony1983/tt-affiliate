- id: IMP-100
  title: SAS 発行ポリシーのテナント別動的管理化（cap-file-ingestion 内 DB に閉じる）
  category: structural
  root_cause: |
    cap-file-ingestion の SAS 発行ポリシー（tenantFileTypePolicy および sasIssuancePolicy の
    allowedContentTypes / maxSizeBytes / maxExpiryMinutes）が Cap 同梱 JSON に静的定義されており、
    テナント別の設定変更に PR マージ + デプロイが必要。
    テナント増加・変更頻度が上がると運用負荷が高い。
  proposed_fix: |
    cap-config-control を介さず、cap-file-ingestion 内に閉じた DB と SasPolicyRepositoryPort で管理する。
    cap-api-iam の TenantAccessPolicy と同パターン（他 Cap から参照されない Cap ローカル設定は
    cap-config-control を介さない）。
    Phase 1: SasPolicyRepositoryPort と Cap 内 DB スキーマを追加。default 値は引き続き同梱 JSON、
             tenant override は DB から取得して SasIssuancePolicyResolver でマージして返す。
             pathTemplate は adls-partition-design.md のパーティション契約を壊さないため override 不可。
    Phase 2: 管理 API（tenant override の CRUD）とキャッシュ層を追加。
    Phase 3: 同梱 JSON は default を保持し、tenantFileTypePolicy セクションは DB へ一定期間の並行運用後に廃止。
  trigger_condition: |
    テナント数 > 10 または テナント設定変更頻度 > 月1回 になった場合、
    またはテナント別に size 上限 / SAS 有効期限 / content_type を切り替える要件が発生した場合。
  change_targets:
  - src/module-d/capabilities/cap_file_ingestion/internal/resources/sas_issuance_policy.json
  - src/module-d/capabilities/cap_file_ingestion/internal/policies/sas_issuance_policy_resolver.py
  - src/module-d/capabilities/cap_file_ingestion/contracts/ports/sas_policy_repository_port.py (新規)
  - src/module-d/capabilities/cap_file_ingestion/adapters/sas_policy_repository.py (新規)
  - src/infrastructure/db/migrations/ (新規テーブル: tenant_sas_policy_override, tenant_file_type_policy)
  - docs/specs/architecture/capabilities/cap-file-ingestion.md
  impact: medium
  effort: medium
  linked_rules: []
  created_at: '2026-06-11'
  status: proposed
  resolved_at: null
