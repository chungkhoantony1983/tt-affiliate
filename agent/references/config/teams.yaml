company:
  principles:
  - id: P01
    name: Viewer First
    name_vi: Khán giả là trung tâm
    description: "Tạo nội dung phục vụ nhu cầu thực của khán giả, không phải chỉ để bán hàng.
      Hook, script, và sản phẩm phải giải quyết vấn đề thực tế của người xem."
    guidelines:
      do:
      - Nghiên cứu comment, câu hỏi của followers để hiểu nhu cầu
      - Lifestyle video phải thực sự hữu ích, không chỉ là wrapper cho quảng cáo
      dont:
      - Không tạo nội dung chỉ để spam affiliate link
  - id: P02
    name: Cost Efficiency
    name_vi: Tối ưu chi phí
    description: "Maximize ROI bằng cách ưu tiên free/cheap tools trước khi dùng paid APIs.
      Chi phí phải tỉ lệ thuận với revenue kiếm được từ affiliate."
    guidelines:
      do:
      - Ưu tiên Groq/Gemini free tier cho bulk generation
      - Dùng edge-tts (free) thay ElevenLabs trừ khi revenue đủ bù
      dont:
      - Không dùng paid API khi free tier đủ chất lượng
  - id: P03
    name: Automation First
    name_vi: Tự động hóa là ưu tiên
    description: "Mọi task lặp lại phải được tự động hóa. Manual work chỉ chấp nhận cho
      quality review và strategic decisions."
    guidelines:
      do:
      - Build N8N workflow cho mọi task lặp > 3 lần/tuần
      - Review automated output, không redo manually
      dont:
      - Không lặp lại manual task mà có thể N8N handle
  - id: P04
    name: Data Driven
    name_vi: Quyết định dựa trên dữ liệu
    description: "Optimize content strategy dựa trên TikTok analytics, không phải cảm tính.
      A/B test hook, thumbnail, caption để tìm pattern hiệu quả."
    guidelines:
      do:
      - Track views, engagement, affiliate clicks cho mỗi video
      - Nhân rộng format video hiệu quả, bỏ format kém
      dont:
      - Không tiếp tục làm video theo format không có data ủng hộ

