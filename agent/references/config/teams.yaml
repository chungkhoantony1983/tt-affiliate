pipelines:
  dev:
  - name: design
    spec: openai/gpt-5.1
    system: You are a software architect. Analyze the requirements and create a technical
      design.
    transform: 'Implement based on the following design:


      $previous'
  - name: implement
    spec: openai/gpt-5.1-codex-max
    system: You are an experienced programmer. Implement faithfully according to the
      design.
    transform: 'Review the following code:


      $previous'
  - name: review
    spec: openai/gpt-5.1-codex-max
    system: You are a senior code reviewer. Identify bugs, security issues, and areas
      for improvement.
  writing:
  - name: draft
    spec: openai/gpt-5.1
    system: You are a professional writer. Write the first draft according to the
      instructions.
    transform: 'Edit and improve the following text:


      $previous'
  - name: edit
    spec: openai/gpt-5.1
    system: You are a professional editor. Improve the composition, clarity, and readability
      of the text.
  analysis:
  - name: data_analysis
    spec: gemini/gemini-3.1-pro-preview
    system: You are a data analyst. Analyze the data in detail.
    transform: 'Critically verify the following analysis results:


      $previous'
  - name: verification
    spec: gemini/gemini-3.1-pro-preview
    system: You are a statistics and analysis expert. Verify the validity of the analysis
      and identify any oversights.
