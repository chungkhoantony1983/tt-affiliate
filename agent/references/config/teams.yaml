domains:
  code-review:
    label: Code Review
    description: Multi-model, multi-persona code quality review
    persona_refs:
    - bank-cto
    - sre
    - automation-cto
    - sa
    - ux
    - domain-expert
    - security
    skills:
    - review
    - re-review
    - ai-review
    workflow:
    - requirements
    - architecture
    - implement
    - review
    - discuss
    - lateral-check
    - report
    orchestration:
      tier1:
        method: claude-agents
        agent_count: 3
        consensus_protocol: mutual-review
      tier2:
        method: multi-model-api
        models:
        - openai/gpt-5.1-codex-max
        - gemini/gemini-3.1-pro-preview
        claude_direct: true
        consensus_protocol: 2-model-consensus
        cli_config:
        - Ruby時は --extra-exts .rb,.gemspec（CR-010）
        - .mdのみPRはplatformスキップ→CC単独7ペルソナ（CR-006）
        - 変更ファイル+テストファイルをtarget_pathに含める（CR-P02）
        - 乖離ブランチはdiffスコーピング（CR-P04）
    phase_assignments:
      primary_scanner: openai/gpt-5.1-codex-max
      lateral_scanner: gemini/gemini-3.1-pro-preview
    coverage:
      max_tokens_per_unit: 20000
      min_scanners_per_changed: 2
      min_scanners_per_related: 1
      require_probe_for_zero_findings: false
    workflows:
      consensus:
        reviewers:
        - openai/gpt-5.1-codex-max
        - gemini/gemini-3.1-pro-preview
        max_rounds: 5
        role_assignments:
          planner: openai/gpt-5.1
          implementer: openai/gpt-5.1-codex-max
          reviewer: null
          tester: openai/gpt-5.1-codex-max
          reporter: openai/gpt-5.1
  fix:
    label: Bug Fix
    description: Defect resolution and preventive measures
    persona_refs:
    - dev-planner
    - dev-implementer
    - dev-reviewer
    - dev-tester
    - fact-checker
    skills:
    - fix
    - ai-fix
    workflow:
    - analyze
    - propose
    - implement
    - lateral-check
    - source-verify
    - verify
    - phase-complete
    orchestration:
      tier1:
        method: claude-agents
      tier2:
        method: workflow-engine
        phase_models:
          analyze: gemini/gemini-3.1-pro-preview
          propose: vote
          implement: openai/gpt-5.1-codex-max
          source-verify: gemini/gemini-3.1-pro-preview
          verify: gemini/gemini-3.1-pro-preview
          test: gemini/gemini-3.1-pro-preview
          phase-complete: gemini/gemini-3.1-pro-preview
  spec:
    label: Specification Management
