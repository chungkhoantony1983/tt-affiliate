    - propose
    - implement
    - lateral-check
    - source-verify
    - verify
    - phase-complete
    orchestration:
      tier1:
        method: claude-agents
      tier2:
        method: workflow-engine
        phase_models:
          analyze: gemini/gemini-3.1-pro-preview
          propose: vote
          implement: openai/gpt-5.1
          source-verify: gemini/gemini-3.1-pro-preview
          verify: gemini/gemini-3.1-pro-preview
          test: gemini/gemini-3.1-pro-preview
          phase-complete: gemini/gemini-3.1-pro-preview
  research:
    label: Research & Investigation
    description: Internet research, market analysis, case study investigation, bug
      survey
    persona_refs:
