schema_version: "1.0"
project_id: "{{ PJ_ID }}"

# Type B: 既存PF導入（HKDパターン）
# Type A のサブセット。PF導入特有の制約から 5_Surface・一部 3_Structure・全 4_Skeleton を省略。
# 成果物はessentialなものに絞り込む。

artifacts:
  # --- G0: PJ管理 ---
  - id: "001-PJ定義"
    doc_id: "{{ PJ_ID }}-001"
    title: "PJ定義"
    category: "0_Project"
    gate: "G0"
    format: "md"
    status: "active"
    version: "0.1.0"

  - id: "002-WBS"
    doc_id: "{{ PJ_ID }}-002"
    title: "WBS"
    category: "0_Project"
    gate: "G0"
    format: "csv"
    status: "active"
    version: "0.1.0"
    derived_by: "derive_wbs_schedule"

  - id: "003-課題管理"
    doc_id: "{{ PJ_ID }}-003"
    title: "課題管理"
    category: "0_Project"
    gate: "G0"
    format: "csv"
    status: "active"
    version: "0.1.0"

  - id: "004-リソース定義"
    doc_id: "{{ PJ_ID }}-004"
    title: "リソース定義"
    category: "0_Project"
    gate: "G0"
    format: "md"
    status: "active"
    version: "0.1.0"
    derived_by: "derive_resources"

  - id: "005-見積書"
    doc_id: "{{ PJ_ID }}-005"
    title: "見積書"
    category: "0_Project"
    gate: "G0"
    format: "md"
    status: "active"
    version: "0.1.0"
    derived_by: "derive_estimate"

  # --- G1: 戦略定義 ---
  - id: "101-ビジネス定義"
    doc_id: "{{ PJ_ID }}-101"
    title: "ビジネス定義"
    category: "1_Strategy"
    gate: "G1"
    format: "md"
    status: "draft"
    version: "0.1.0"

  # --- G1〜G2: 要件定義 ---
  - id: "201-機能要件定義"
    doc_id: "{{ PJ_ID }}-201"
    title: "機能要件定義"
    category: "2_Scope"
    gate: "G1"
    format: "md"
    status: "draft"
    version: "0.1.0"

  - id: "201-02-ユーザーストーリー"
    doc_id: "{{ PJ_ID }}-201-02"
    title: "ユーザーストーリー"
    category: "2_Scope"
    gate: "G1"
    format: "md"
    status: "draft"
    version: "0.1.0"

  - id: "202-非機能要件定義"
    doc_id: "{{ PJ_ID }}-202"
    title: "非機能要件定義"
    category: "2_Scope"
    gate: "G1"
    format: "md"
    status: "draft"
    version: "0.1.0"

  # --- G2: 構造定義（PF導入はUI骨格・表層を省略。インフラ・IA・画面定義のみ） ---
  - id: "301-インフラ構成定義"
    doc_id: "{{ PJ_ID }}-301"
    title: "インフラ構成定義"
    category: "3_Structure"
    gate: "G2"
    format: "md"
    status: "draft"
    version: "0.1.0"

  - id: "302-情報アーキテクチャ定義"
    doc_id: "{{ PJ_ID }}-302"
    title: "情報アーキテクチャ定義"
    category: "3_Structure"
    gate: "G2"
    format: "md"
    status: "draft"
    version: "0.1.0"

  - id: "305-プレゼンテーション定義"
    doc_id: "{{ PJ_ID }}-305"
    title: "プレゼンテーション定義"
    category: "3_Structure"
    gate: "G2"
    format: "md"
    status: "draft"
    version: "0.1.0"

  # --- G3: 運用定義 ---
  - id: "702-SLA"
    doc_id: "{{ PJ_ID }}-702"
    title: "SLA"
    category: "7_Operations"
    gate: "G3"
    format: "md"
    status: "draft"
    version: "0.1.0"

dependencies:
  # WBS → リソース → 見積（導出チェーン）
  - from: "002-WBS"
    to: "004-リソース定義"
    type: "derives"
    description: "WBSのロール人日からリソース配分・FTEを導出"
  - from: "002-WBS"
    to: "005-見積書"
    type: "derives"
    description: "WBSのフェーズ構成から段階見積を導出"
  - from: "004-リソース定義"
    to: "005-見積書"
    type: "derives"
    description: "リソース定義の金額から見積書を導出"

  # PJ定義 → 各成果物
  - from: "001-PJ定義"
    to: "002-WBS"
    type: "references"
    description: "ゲート定義・成果物一覧を参照"
  - from: "001-PJ定義"
    to: "003-課題管理"
    type: "references"
    description: "課題カテゴリをPJ定義から参照"

  # ビジネス定義 → 要件定義
  - from: "101-ビジネス定義"
    to: "201-機能要件定義"
    type: "derives"
    description: "ビジネス要件から機能要件を導出"
  - from: "101-ビジネス定義"
    to: "202-非機能要件定義"
    type: "references"
    description: "ビジネス要件からSLA要件等を参照"

  # 機能要件定義 → 下流成果物
  - from: "201-機能要件定義"
    to: "201-02-ユーザーストーリー"
    type: "derives"
    description: "機能要件からユーザーストーリーを導出"
  - from: "201-機能要件定義"
    to: "302-情報アーキテクチャ定義"
    type: "derives"
    description: "機能要件からデータモデルを導出"
  - from: "201-機能要件定義"
    to: "305-プレゼンテーション定義"
    type: "derives"
    description: "機能要件から画面一覧を導出"

  # 非機能要件 → SLA・インフラ
  - from: "202-非機能要件定義"
    to: "702-SLA"
    type: "derives"
    description: "非機能要件からSLA条件を導出"
  - from: "202-非機能要件定義"
    to: "301-インフラ構成定義"
    type: "derives"
    description: "非機能要件からインフラ構成を導出"

  # スコープ変更 → WBS
  - from: "201-機能要件定義"
    to: "002-WBS"
    type: "derives"
    description: "機能追加/削除時にWBSタスクを更新"

change_categories:
  scope:
    label: "スコープ変更"
    description: "機能追加/削除 → 機能要件 → WBS → リソース → 見積"
    entry_points: ["201-機能要件定義", "101-ビジネス定義"]
  schedule:
    label: "スケジュール変更"
    description: "マイルストーン変更 → WBS → リソース → 見積"
    entry_points: ["002-WBS"]
  sla:
    label: "SLA変更"
    description: "SLA条件変更 → 非機能要件 → インフラ構成"
    entry_points: ["702-SLA", "202-非機能要件定義"]
  cost:
    label: "コスト変更"
    description: "単価変更/体制変更 → 見積 → 支払計画"
    entry_points: ["004-リソース定義", "005-見積書"]
  team:
    label: "体制変更"
    description: "ロール追加/削除 → FTE計画 → 見積"
    entry_points: ["004-リソース定義"]
